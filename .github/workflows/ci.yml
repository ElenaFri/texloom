name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Build & Test (${{ matrix.build_type }})
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    
    strategy:
      fail-fast: false
      matrix:
        include:
          # Fast build without heavy tools (Pandoc/XeLaTeX)
          - build_type: Release
            coverage: false
            install_converters: false
          # Full build with coverage and all tools
          - build_type: Debug  
            coverage: true
            install_converters: true
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Detect changed files
      uses: dorny/paths-filter@v3
      id: changes
      with:
        filters: |
          code:
            - 'app/src/**'
            - 'app/tests/**'
            - 'app/CMakeLists.txt'
            - '.github/workflows/ci.yml'
    
    # ========== CACHING ==========
    
    - name: Cache ccache
      if: steps.changes.outputs.code == 'true' || steps.changes.outputs.code == ''
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ${{ runner.os }}-ccache-${{ matrix.build_type }}-${{ hashFiles('app/src/**') }}
        restore-keys: |
          ${{ runner.os }}-ccache-${{ matrix.build_type }}-
          ${{ runner.os }}-ccache-
    
    - name: Cache CMake build
      if: steps.changes.outputs.code == 'true' || steps.changes.outputs.code == ''
      uses: actions/cache@v4
      with:
        path: app/build
        key: ${{ runner.os }}-cmake-${{ matrix.build_type }}-${{ hashFiles('app/CMakeLists.txt', 'app/src/**', 'app/tests/**') }}
        restore-keys: |
          ${{ runner.os }}-cmake-${{ matrix.build_type }}-
    
    # ========== DEPENDENCIES ==========
    
    - name: Install base dependencies
      if: steps.changes.outputs.code == 'true' || steps.changes.outputs.code == ''
      run: |
        sudo apt update -qq
        sudo apt install -y --no-install-recommends \
          build-essential \
          cmake \
          qt6-base-dev \
          qt6-base-dev-tools \
          xvfb \
          valgrind \
          lcov \
          ccache
    
    - name: Install conversion tools (coverage job only)
      if: (steps.changes.outputs.code == 'true' || steps.changes.outputs.code == '') && matrix.install_converters
      run: |
        # Heavy tools only for coverage job
        # Note: Installing tex packages without --no-install-recommends
        # to ensure all TeX infrastructure is properly set up
        sudo apt install -y --no-install-recommends pandoc
        sudo apt install -y \
          texlive-xetex \
          texlive-latex-base \
          texlive-latex-recommended \
          texlive-fonts-recommended \
          lmodern
    
    - name: Setup ccache
      if: steps.changes.outputs.code == 'true' || steps.changes.outputs.code == ''
      run: |
        echo "/usr/lib/ccache" >> $GITHUB_PATH
        ccache --max-size=500M
        ccache --zero-stats
    
    # ========== BUILD ==========
    
    - name: Configure CMake
      if: steps.changes.outputs.code == 'true' || steps.changes.outputs.code == ''
      run: |
        cd app
        mkdir -p build
        cd build
        cmake \
          ${{ matrix.coverage && '-DENABLE_COVERAGE=ON' || '' }} \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
          ..
    
    - name: Build
      if: steps.changes.outputs.code == 'true' || steps.changes.outputs.code == ''
      run: |
        cd app/build
        cmake --build . -j$(nproc)
    
    - name: Show ccache stats
      if: steps.changes.outputs.code == 'true' || steps.changes.outputs.code == ''
      run: ccache --show-stats
    
    # ========== TESTING ==========
    
    - name: Run tests
      if: steps.changes.outputs.code == 'true' || steps.changes.outputs.code == ''
      run: |
        cd app/build
        xvfb-run -a --server-args="-screen 0 1024x768x24" ctest --output-on-failure
      env:
        QT_QPA_PLATFORM: offscreen
    
    - name: Memory check with Valgrind (Release only)
      if: (steps.changes.outputs.code == 'true' || steps.changes.outputs.code == '') && !matrix.coverage
      run: |
        cd app/build
        ctest -T memcheck --output-on-failure || true
      continue-on-error: true
    
    # ========== COVERAGE ==========
    
    - name: Generate coverage report
      if: (steps.changes.outputs.code == 'true' || steps.changes.outputs.code == '') && matrix.coverage
      run: |
        cd app/build
        # lcov may return exit 25 for warnings (unused patterns, no branch data)
        # Continue anyway as coverage.info is properly generated
        lcov --capture --directory . --output-file coverage.info || true
        lcov --remove coverage.info \
          '/usr/*' \
          '*/tests/*' \
          '*/build/*' \
          '*autogen*' \
          '*/src/ui/MainWindow.cpp' \
          '*/src/ui/MainWindow.h' \
          '*/src/main.cpp' \
          --output-file coverage.info || true
        lcov --list coverage.info || true
        # Verify coverage.info was created before upload
        test -f coverage.info && echo "✓ coverage.info generated" || echo "✗ coverage.info missing"
    
    - name: Remove raw gcov artifacts
      if: (steps.changes.outputs.code == 'true' || steps.changes.outputs.code == '') && matrix.coverage
      run: |
        echo "Removing .gcno, .gcda, .gcov so Codecov cannot re-run gcov"
        find app/build -name '*.gcno' -o -name '*.gcda' -o -name '*.gcov' | xargs rm -f
        echo "✓ raw artifacts removed — only coverage.info remains"

    - name: Upload to Codecov
      if: (steps.changes.outputs.code == 'true' || steps.changes.outputs.code == '') && matrix.coverage
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: app/build/coverage.info
        fail_ci_if_error: true
    
    # ========== ARTIFACTS ==========
    
    - name: Upload binary (Release on main only)
      if: (steps.changes.outputs.code == 'true' || steps.changes.outputs.code == '') && !matrix.coverage && success() && github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: texloom-linux
        path: app/build/bin/texloom
        retention-days: 90
